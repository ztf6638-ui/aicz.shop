name: Sync ai6638.com into aicz.shop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-from-ai6638.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone source repository
        run: git clone --depth 1 https://github.com/ztf6638-ui/ai6638.com.git /tmp/ai6638-source

      - name: Copy source files
        run: |
          rsync -a --delete --exclude='.git' --exclude='.github' /tmp/ai6638-source/ ./
          printf 'aicz.shop\n' > CNAME
          python3 - <<'PY'
          from pathlib import Path
          for name in ['robots.txt', 'sitemap.xml']:
              path = Path(name)
              if path.exists():
                  text = path.read_text(encoding='utf-8')
                  text = text.replace('https://gptchongzhi.net', 'https://aicz.shop')
                  text = text.replace('gptchongzhi.net', 'aicz.shop')
                  text = text.replace('ai6638.com', 'aicz.shop')
                  path.write_text(text, encoding='utf-8')
          PY

      - name: Commit copied site
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'Copy ai6638.com site into aicz.shop [skip ci]'
          git push
