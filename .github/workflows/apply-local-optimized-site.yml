name: Apply local optimized site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-local-optimized-site.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply local optimized site patch
        run: |
          cat .github/aicz-local-patch/part-* > /tmp/aicz-optimized.patch.gz.b64
          base64 -d /tmp/aicz-optimized.patch.gz.b64 | gunzip > /tmp/aicz-optimized.patch
          git apply --index /tmp/aicz-optimized.patch
          rm -rf .github/aicz-local-patch .github/workflows/apply-local-optimized-site.yml
          git add -A

      - name: Commit optimized site
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --quiet && echo 'No changes to commit' && exit 0
          git commit -m 'Publish optimized product landing pages [skip ci]'
          git push
